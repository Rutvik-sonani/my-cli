name: Bug Report
description: Report a bug in MyCLI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug in **MyCLI**.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and how to reproduce it.
      placeholder: Steps to reproduce…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MyCLI version
      placeholder: Run `my --version` or check package.json
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots.
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true
